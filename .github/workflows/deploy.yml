name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Push the built site to the gh-pages branch, which GitHub Pages serves.
permissions:
  contents: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          # PR previews live under pr-preview/ on the same branch; a main
          # deploy must not delete them.
          clean-exclude: pr-preview/
          force: false
