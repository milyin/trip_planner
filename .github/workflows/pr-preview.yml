name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

# Push previews to the gh-pages branch and keep a sticky PR comment updated.
# Note: fork PRs get a read-only token, so previews only work for
# same-repository branches.
permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        # The preview is served at /trip_planner/pr-preview/pr-<N>/, so the
        # base path from vite.config.ts must be overridden.
        run: npm run build -- --base=/trip_planner/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
